<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="usuario.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-User</title>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form>
            <input type="email" id="email-user" placeholder="Email">
            <input type="password" id="senha-user" placeholder="Password">
           
            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
           
            <button type="button" onclick="cadastrarUsuario()">Log In</button>
           
            <p class="register-link">Don't have an account? <a href="#">Register</a></p>
            <p class="register-link">E o admin? <a href="login-admin.html">Login</a></p>
        </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
