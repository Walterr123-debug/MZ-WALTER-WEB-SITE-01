<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <link rel="stylesheet" href="admin-upload-video.css">
    <meta charset="UTF-8">
    <title>Upload de Tutoriais - Admin</title>
    <link rel="stylesheet" href="estilo-upload-video.css">
</head>
<body>

    <div class="upload-video-container">
        <h2>Adicionar Tutorial</h2>
       
        <form id="form-video">
            <div class="form-group">
                <label for="titulo-video">Título do Vídeo</label>
                <input type="text" id="titulo-video" placeholder="Ex: Como decorar o bolo">
            </div>

            <div class="form-group">
                <label for="arquivo-video">Selecionar Vídeo (MP4)</label>
                <input type="file" id="arquivo-video" accept="video/mp4">
            </div>

            <button type="button" class="btn-publicar" onclick="salvarTutorial()">
                Publicar Tutorial
            </button>
        </form>

        <a href="admin-produtos.html" class="link-voltar">Painel de produtos</a>
    </div>

    <script src="videos.js"></script>
</body>
</html>
